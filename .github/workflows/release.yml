name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} --generate-notes dist/*.whl dist/*.tar.gz || \
          gh release upload ${{ github.ref_name }} dist/*.whl dist/*.tar.gz --clobber

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
