name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          PYTHONPATH="${PYTHONPATH}:${GITHUB_WORKSPACE}/dummy_nodes" \
            python -m pytest tests/unit/ tests/integration/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff isort

      - name: Check formatting with ruff
        run: ruff check .

      - name: Check import sorting (excluding xpyd/)
        run: isort --check-only --diff --skip xpyd .

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Install from wheel
        run: pip install dist/*.whl

      - name: CLI smoke test
        run: |
          xpyd --help
          xpyd --version

      - name: Run tests (installed mode)
        run: |
          pip install pytest pytest-asyncio aiohttp requests
          PYTHONPATH="${PYTHONPATH}:${GITHUB_WORKSPACE}/dummy_nodes" \
            python -m pytest tests/integration/test_cli_and_discovery.py -v --tb=short

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run benchmark tests
        run: |
          PYTHONPATH="${PYTHONPATH}:${GITHUB_WORKSPACE}/dummy_nodes" \
            python -m pytest tests/stress/ -v --tb=short -m benchmark -s
