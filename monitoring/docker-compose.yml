# One-click Prometheus + Grafana monitoring stack for xPyD-proxy
# Usage: docker compose up -d
version: "3.8"

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: xpyd-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: xpyd-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/xpyd-pd-metrics.json
    volumes:
      - ./grafana/xpyd-pd-metrics.json:/var/lib/grafana/dashboards/xpyd-pd-metrics.json:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
